<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kirtana Minoy | Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #f5f3ef;
    color: #1f2937;
}

/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    font-weight: 500;
}

nav .logo {
    font-size: 20px;
    font-weight: bold;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #374151;
}

nav a:hover {
    color: #ea580c;
}

/* Hero Section */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px;
}

/* Left Content */
.left {
    max-width: 500px;
}

.tag {
    display: inline-block;
    background: #ea580c;
    color: white;
    padding: 6px 12px;
    font-size: 12px;
    margin-bottom: 20px;
}

.left h1 {
    font-size: 56px;
    line-height: 1.1;
}

.left span {
    color: #ea580c;
}

.left p {
    margin-top: 20px;
    color: #4b5563;
    line-height: 1.6;
}

/* Buttons */
.buttons {
    margin-top: 25px;
}

.btn {
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    margin-right: 10px;
    font-weight: 500;
}

.primary {
    background: #1f2937;
    color: white;
}

.secondary {
    background: transparent;
    border: 1px solid #1f2937;
}

/* Right Card */
.card {
    width: 300px;
    padding: 25px;
    border-radius: 15px;
    background: linear-gradient(135deg, #f97316, #f59e0b);
    color: white;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.card h3 {
    font-size: 14px;
    margin-bottom: 10px;
    opacity: 0.8;
}

.big {
    font-size: 40px;
    font-weight: bold;
}

.tech span {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 5px 10px;
    margin: 5px;
    border-radius: 5px;
    font-size: 12px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">Kirtana Minoy</div>
    <div>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </div>
</nav>

<section class="hero">

    <!-- Left -->
    <div class="left">
        <div class="tag">AVAILABLE FOR INTERNSHIPS</div>

        <h1>
            Web Developer <br>
            & <span>Designer</span>
        </h1>

        <p>
            I build clean and functional web experiences. Passionate about
            turning ideas into well-designed and efficient applications.
        </p>

        <div class="buttons">
            <button class="btn primary">View My Work</button>
            <button class="btn secondary">Get in Touch</button>
        </div>
    </div>

    <!-- Right -->
    <div class="card">
        <h3>Current Focus</h3>
        <div class="big">3</div>
        <p>Projects Completed</p>

        <h3 style="margin-top:20px;">Tech Stack</h3>
        <div class="tech">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>Python</span>
        </div>
    </div>

</section>

</body>
</html>
